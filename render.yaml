# ─── Render Blueprint ─────────────────────────────────
# Deploy: https://render.com/docs/blueprint-spec
# Click "New" → "Blueprint" → connect this repo

databases:
  - name: gravit-postgres
    plan: free
    databaseName: gravit
    user: gravit

services:
  - type: web
    name: gravit-api
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gravit-postgres
          property: connectionString
      - key: MONGODB_URI
        sync: false       # set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false       # set manually after OAuth setup
      - key: ALLOWED_DOMAIN
        value: iitj.ac.in
      - key: INSTITUTION_NAME
        value: IIT Jodhpur
      - key: INSTITUTION_SALT
        generateValue: true
      - key: FRONTEND_URL
        sync: false       # set to your Render URL after first deploy
